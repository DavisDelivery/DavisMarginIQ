[build]
  publish = "public"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

# Extended timeout for Zoom sync functions
[functions."marginiq-zoom-phone"]
  timeout = 60

[functions."marginiq-zoom-sync"]
  timeout = 300

# NuVizz API proxy
[[redirects]]
  from = "/api/nuvizz/*"
  to = "/.netlify/functions/nuvizz/:splat"
  status = 200

# Deployer page — served directly, not caught by SPA redirect
[[redirects]]
  from = "/push"
  to = "/push.html"
  status = 200

# SPA catch-all (must be LAST)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
  conditions = {Query = {"!redirect" = "no"}}
