name: Deploy Firebase Rules

on:
  push:
    branches: [main]
    paths:
      - "firestore.rules"
      - "storage.rules"
      - "firebase.json"
  workflow_dispatch: # allow manual re-run from Actions tab

jobs:
  deploy-rules:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Write service account to disk
        run: |
          echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT }}' > "$RUNNER_TEMP/sa.json"
          if [ ! -s "$RUNNER_TEMP/sa.json" ]; then
            echo "::error::FIREBASE_SERVICE_ACCOUNT secret is empty or missing."
            echo "Add a service-account JSON key as a repo secret named FIREBASE_SERVICE_ACCOUNT."
            exit 1
          fi

      - name: Deploy Firestore + Storage rules
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ runner.temp }}/sa.json
        run: firebase deploy --only firestore:rules,storage --project davismarginiq --non-interactive
