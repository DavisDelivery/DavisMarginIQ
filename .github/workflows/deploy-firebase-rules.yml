name: Deploy Firebase Rules

on:
  push:
    branches: [main]
    paths:
      - "firestore.rules"
      - "storage.rules"
      - "firebase.json"

jobs:
  deploy-rules:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Deploy Firestore rules
        run: firebase deploy --only firestore:rules,storage --project davismarginiq --token "${{ secrets.FIREBASE_TOKEN }}"
